services:
  - type: web
    name: financeorg-web
    env: node
    plan: free
    branch: main
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: FRONTEND_URL
        value: https://financeorg.online
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: BALANCE_GROWTH_ENABLED
        value: "true"