services:
  - type: web
    name: elonu-elon-web
    env: node
    plan: free
    branch: main
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: FRONTEND_URL
        value: https://financeorg.online
      - key: JWT_SECRET
        value: your_secure_jwt_secret_here_change_this
      - key: ADMIN_API_KEY
        value: your_secure_admin_key_here_change_this